name: Deskjockey
options:
  bundleIdPrefix: ai.mistral
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  DeskjockeyCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/DeskjockeyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.mistral.DeskjockeyCore
        PRODUCT_NAME: DeskjockeyCore
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: true
  Deskjockey:
    type: application
    platform: macOS
    sources:
      - path: Sources/DeskjockeyApp
    dependencies:
      - target: DeskjockeyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.mistral.Deskjockey
        PRODUCT_NAME: Deskjockey
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSHighResolutionCapable: true
        INFOPLIST_KEY_CFBundleDisplayName: Deskjockey
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: Sources/DeskjockeyApp/Deskjockey.entitlements
  DeskjockeyCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/DeskjockeyCoreTests
    dependencies:
      - target: DeskjockeyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.mistral.DeskjockeyCoreTests
        GENERATE_INFOPLIST_FILE: true
